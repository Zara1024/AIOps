# 智维云枢 - 后端配置文件
server:
  port: 8080
  mode: debug  # debug / release / test
  read_timeout: 10s
  write_timeout: 10s

database:
  host: localhost
  port: 5432
  user: cloudops
  password: cloudops123
  dbname: cloudops
  sslmode: disable
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 5m

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0
  pool_size: 100

jwt:
  secret: "cloudops-hub-jwt-secret-key-2026"
  access_token_expire: 30m
  refresh_token_expire: 168h  # 7天
  issuer: "cloudops-hub"

log:
  level: debug  # debug / info / warn / error
  format: json  # json / text
  output: stdout  # stdout / file
  file_path: logs/cloudops.log

cors:
  allow_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
  allow_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allow_headers:
    - "Authorization"
    - "Content-Type"
    - "X-Request-ID"
  expose_headers:
    - "X-Request-ID"
  allow_credentials: true
  max_age: 12h

rate_limit:
  enabled: true
  requests_per_minute: 100
  ai_requests_per_minute: 10
